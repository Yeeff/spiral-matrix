<div class="container">
  <h1>Matriz Caracol</h1>
  
  <div class="input-section">
    <label for="nInput">Ingresa un número (3-15):</label>
    <input 
      type="number" 
      id="nInput" 
      [(ngModel)]="n" 
      min="3" 
      max="15"
      placeholder="3"
      (keyup.enter)="generateMatrix()"
    />
    <button (click)="generateMatrix()" [disabled]="loading">
      {{ loading ? 'Cargando...' : 'Generar Matriz' }}
    </button>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div class="matrix-section">
    <div *ngIf="!matrix && !loading" class="placeholder">
      Aquí aparecerá la matriz
    </div>

    <div *ngIf="loading" class="placeholder">
      Cargando...
    </div>

    <div *ngIf="matrix" class="matrix-grid">
      <div *ngFor="let row of matrix" class="matrix-row">
        <div *ngFor="let cell of row" class="matrix-cell">
          {{ cell }}
        </div>
      </div>
    </div>
  </div>
</div>
